<!DOCTYPE html>
<html>
<head>
    <title>Exam Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadResults()">

<h2>Exam Portal</h2>

<form onsubmit="addResult(event)">
    <input type="text" id="studentName" placeholder="Student Name"><br><br>
    <input type="text" id="subject" placeholder="Subject"><br><br>
    <input type="number" id="marks" placeholder="Marks"><br><br>

    <button type="submit">Add Result</button>
</form>

<h3>Results</h3>

<table border="1" id="resultTable">
    <tr>
        <th>Name</th>
        <th>Subject</th>
        <th>Marks</th>
    </tr>
</table>

<br><a href="dashboard.html">Back</a>

<script src="script.js"></script>
</body>
</html>
