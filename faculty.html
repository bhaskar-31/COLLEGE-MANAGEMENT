<!DOCTYPE html>
<html>
<head>
    <title>Faculty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadFaculty()">

<h2>Faculty Management</h2>

<form onsubmit="addFaculty(event)">
    <input type="text" id="facName" placeholder="Faculty Name"><br><br>
    <input type="text" id="subject" placeholder="Subject"><br><br>

    <button type="submit">Add Faculty</button>
</form>

<h3>Faculty List</h3>

<table border="1" id="facultyTable">
    <tr>
        <th>Name</th>
        <th>Subject</th>
    </tr>
</table>

<br><a href="dashboard.html">Back</a>

<script src="script.js"></script>
</body>
</html>
